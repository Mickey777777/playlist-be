<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moodify — 오늘의 감정 플레이리스트</title>
  <style>
    /* ── Reset & Variables ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d12;
      --surface:    #16161f;
      --surface2:   #1e1e2a;
      --border:     rgba(255,255,255,.08);
      --text:       #e8e8f0;
      --muted:      #8888a8;
      --accent:     #7c6af7;
      --accent2:    #a78bfa;
      --spotify:    #1db954;
      --radius:     14px;
      --radius-sm:  8px;
      --transition: .22s cubic-bezier(.4,0,.2,1);

      /* 날씨별 그라디언트 */
      --grad-default: linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
      --grad-맑음:    linear-gradient(135deg,#f6d365 0%,#fda085 50%,#f093fb 100%);
      --grad-흐림:    linear-gradient(135deg,#4a4a6a 0%,#6a6a9a 50%,#3a3a5a 100%);
      --grad-비:      linear-gradient(135deg,#1a1a2e 0%,#2d4a7a 50%,#0a2a5a 100%);
      --grad-눈:      linear-gradient(135deg,#c8d6e5 0%,#a8c0d6 50%,#8fb0cc 100%);
      --grad-바람:    linear-gradient(135deg,#134e5e 0%,#71b280 100%);
      --grad-폭풍:    linear-gradient(135deg,#0a0a0a 0%,#1a0a2a 50%,#2a0a1a 100%);
      --grad-안개:    linear-gradient(135deg,#2c3e50 0%,#4ca1af 100%);
      --grad-더움:    linear-gradient(135deg,#f7971e 0%,#ffd200 50%,#f7971e 100%);
      --grad-추움:    linear-gradient(135deg,#0575e6 0%,#021b79 100%);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      transition: background var(--transition);
    }

    /* ── 배경 캔버스 ─────────────────────────────────────────────────── */
    #bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      background: var(--grad-default);
      opacity: .18;
      transition: background 0.8s ease;
      pointer-events: none;
    }

    /* ── 레이아웃 ────────────────────────────────────────────────────── */
    .wrapper {
      position: relative; z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    /* ── 헤더 ────────────────────────────────────────────────────────── */
    header {
      text-align: center;
      padding: 56px 0 40px;
    }

    .logo {
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: -1.5px;
      background: linear-gradient(135deg, var(--accent2) 0%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      margin-top: 8px;
      color: var(--muted);
      font-size: .95rem;
      letter-spacing: .02em;
    }

    /* ── 카드 공통 ───────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 16px;
    }

    .section-label {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── 날씨 선택 ───────────────────────────────────────────────────── */
    .weather-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 10px;
    }

    .weather-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 14px 8px;
      background: var(--surface2);
      border: 2px solid transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
      color: var(--text);
      font-size: .82rem;
      font-weight: 500;
      outline: none;
    }

    .weather-btn .emoji { font-size: 1.6rem; line-height: 1; }

    .weather-btn:hover {
      border-color: var(--accent);
      background: rgba(124,106,247,.12);
      transform: translateY(-2px);
    }

    .weather-btn.selected {
      border-color: var(--accent2);
      background: rgba(167,139,250,.18);
      color: var(--accent2);
    }

    /* ── 일기 입력 ───────────────────────────────────────────────────── */
    .diary-textarea {
      width: 100%;
      min-height: 130px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: .95rem;
      font-family: inherit;
      line-height: 1.7;
      padding: 14px 16px;
      resize: vertical;
      transition: border-color var(--transition);
      outline: none;
    }

    .diary-textarea::placeholder { color: var(--muted); }
    .diary-textarea:focus { border-color: var(--accent); }

    .char-count {
      text-align: right;
      font-size: .75rem;
      color: var(--muted);
      margin-top: 6px;
    }
    .char-count.warn { color: #f87171; }

    /* ── 트랙 수 슬라이더 ────────────────────────────────────────────── */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 4px;
    }

    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 9999px;
      background: var(--surface2);
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent2);
      cursor: pointer;
      transition: transform var(--transition);
    }

    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    .slider-val {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--accent2);
      min-width: 28px;
      text-align: center;
    }

    /* ── 추천 버튼 ───────────────────────────────────────────────────── */
    .recommend-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent) 0%, #60a5fa 100%);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: var(--transition);
      letter-spacing: .03em;
      position: relative;
      overflow: hidden;
    }

    .recommend-btn:hover:not(:disabled) {
      opacity: .9;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(124,106,247,.4);
    }

    .recommend-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    .recommend-btn .btn-spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }

    .recommend-btn.loading .btn-text { display: none; }
    .recommend-btn.loading .btn-spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 태그 배지 ───────────────────────────────────────────────────── */
    .tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tag-badge {
      padding: 4px 12px;
      border-radius: 9999px;
      background: rgba(124,106,247,.18);
      border: 1px solid rgba(124,106,247,.35);
      color: var(--accent2);
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .04em;
    }

    /* ── 트랙 카드 ───────────────────────────────────────────────────── */
    #playlist-section { display: none; }

    .track-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .track-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }

    .track-card:hover {
      border-color: rgba(124,106,247,.4);
      background: rgba(124,106,247,.07);
      transform: translateX(3px);
    }

    .track-num {
      font-size: .72rem;
      color: var(--muted);
      font-weight: 700;
      min-width: 20px;
      text-align: center;
    }

    .track-cover {
      width: 52px; height: 52px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--surface);
      flex-shrink: 0;
    }

    .track-cover-placeholder {
      width: 52px; height: 52px;
      border-radius: 6px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .track-info { flex: 1; min-width: 0; }

    .track-title {
      font-weight: 600;
      font-size: .9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-spotify {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 9999px;
      border: none;
      background: #fc3c44;
      color: #fff;
      font-size: .75rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: var(--transition);
      white-space: nowrap;
    }

    .btn-spotify:hover { opacity: .85; transform: scale(1.04); }
    .btn-spotify.disabled {
      background: var(--surface);
      color: var(--muted);
      cursor: default;
      border: 1px solid var(--border);
    }
    .btn-spotify.disabled:hover { transform: none; opacity: 1; }

    .btn-preview {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: .85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .btn-preview:hover { border-color: var(--accent); color: var(--accent2); }
    .btn-preview.playing { border-color: var(--spotify); color: var(--spotify); }
    .btn-preview.no-preview { display: none; }

    /* ── 에러/빈 상태 ────────────────────────────────────────────────── */
    .error-box {
      padding: 14px 18px;
      border-radius: var(--radius-sm);
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.3);
      color: #fca5a5;
      font-size: .88rem;
      display: none;
    }

    /* ── 푸터 ────────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding-top: 40px;
      color: var(--muted);
      font-size: .78rem;
    }

    footer a { color: var(--accent2); text-decoration: none; }

    /* ── 반응형 ──────────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .logo { font-size: 2rem; }
      .weather-grid { grid-template-columns: repeat(3, 1fr); }
      .track-num { display: none; }
    }

    /* ── 스크롤 애니메이션 ───────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp .4s ease both; }
  </style>
</head>
<body>

<div id="bg-canvas"></div>

<div class="wrapper">

  <!-- 헤더 -->
  <header>
    <div class="logo">🎵 Moodify</div>
    <p class="tagline">오늘의 날씨와 일기로 당신만의 플레이리스트를 만들어보세요</p>
  </header>

  <!-- 날씨 선택 -->
  <div class="card">
    <div class="section-label">오늘의 날씨</div>
    <div class="weather-grid" id="weather-grid">
      <!-- JS로 렌더링 -->
    </div>
  </div>

  <!-- 일기 입력 -->
  <div class="card">
    <div class="section-label">오늘의 일기 / 감정 메모</div>
    <textarea
      class="diary-textarea"
      id="diary-input"
      placeholder="오늘 어떤 하루였나요? 어떤 감정을 느꼈는지 자유롭게 적어주세요 ✍️"
      maxlength="2000"
    ></textarea>
    <div class="char-count" id="char-count">0 / 2000</div>
  </div>

  <!-- 트랙 수 -->
  <div class="card">
    <div class="section-label">추천 트랙 수</div>
    <div class="slider-row">
      <input type="range" id="track-count" min="3" max="20" value="10" />
      <span class="slider-val" id="track-val">10</span>
    </div>
  </div>

  <!-- 에러 메시지 -->
  <div class="error-box" id="error-box"></div>

  <!-- 추천 버튼 -->
  <button class="recommend-btn" id="recommend-btn" disabled>
    <span class="btn-text">✨ 플레이리스트 추천받기</span>
    <span class="btn-spinner"></span>
  </button>

  <!-- 플레이리스트 결과 -->
  <div id="playlist-section">
    <div class="card" style="margin-top:24px;">
      <div class="section-label" id="playlist-label">추천 플레이리스트</div>
      <div class="tags-row" id="tags-row"></div>
      <div class="track-list" id="track-list"></div>
    </div>
  </div>

  <footer>
    Powered by <a href="https://deepmind.google/gemini" target="_blank">Gemini 2.0 Flash</a> ·
    <a href="https://www.last.fm" target="_blank">Last.fm</a> ·
    <a href="https://spotify.com" target="_blank">Spotify</a><br>
    GDG 대구 Build with AI 해커톤 2026
  </footer>

</div>

<!-- 숨겨진 오디오 플레이어 -->
<audio id="preview-audio" preload="none"></audio>

<script>
/* ── 설정 ──────────────────────────────────────────────────────────── */
const API_BASE = '';  // 같은 오리진 사용. 외부 서버라면 'https://your-api.run.app'

/* ── 상태 ──────────────────────────────────────────────────────────── */
let selectedWeather = null;
let currentPlayingBtn = null;
const audio = document.getElementById('preview-audio');

/* ── 날씨 버튼 초기화 ──────────────────────────────────────────────── */
async function loadWeatherOptions() {
  const grid = document.getElementById('weather-grid');
  let options;

  try {
    const res = await fetch(`${API_BASE}/weather-options`);
    const data = await res.json();
    options = data.options;
  } catch {
    // 오프라인 폴백
    options = [
      { value:'맑음', emoji:'☀️' }, { value:'흐림', emoji:'☁️' },
      { value:'비',   emoji:'🌧️' }, { value:'눈',   emoji:'❄️' },
      { value:'바람', emoji:'💨' }, { value:'폭풍', emoji:'⛈️' },
      { value:'안개', emoji:'🌫️' }, { value:'더움', emoji:'🌡️' },
      { value:'추움', emoji:'🧊' },
    ];
  }

  grid.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'weather-btn';
    btn.dataset.value = opt.value;
    btn.innerHTML = `<span class="emoji">${opt.emoji}</span><span>${opt.value}</span>`;
    btn.addEventListener('click', () => selectWeather(opt.value, btn));
    grid.appendChild(btn);
  });
}

function selectWeather(value, btn) {
  selectedWeather = value;
  document.querySelectorAll('.weather-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  // 배경 그라디언트 변경
  const canvas = document.getElementById('bg-canvas');
  const grad = getComputedStyle(document.documentElement).getPropertyValue(`--grad-${value}`).trim();
  if (grad) canvas.style.background = grad;

  updateBtn();
}

/* ── 일기 글자 수 ───────────────────────────────────────────────────── */
const diaryInput = document.getElementById('diary-input');
const charCount  = document.getElementById('char-count');

diaryInput.addEventListener('input', () => {
  const len = diaryInput.value.length;
  charCount.textContent = `${len} / 2000`;
  charCount.classList.toggle('warn', len > 1800);
  updateBtn();
});

/* ── 슬라이더 ───────────────────────────────────────────────────────── */
const slider   = document.getElementById('track-count');
const trackVal = document.getElementById('track-val');
slider.addEventListener('input', () => { trackVal.textContent = slider.value; });

/* ── 버튼 활성화 ────────────────────────────────────────────────────── */
function updateBtn() {
  const btn = document.getElementById('recommend-btn');
  btn.disabled = !(selectedWeather && diaryInput.value.trim().length >= 5);
}

/* ── 추천 API 호출 ──────────────────────────────────────────────────── */
document.getElementById('recommend-btn').addEventListener('click', async () => {
  const btn = document.getElementById('recommend-btn');
  const errBox = document.getElementById('error-box');

  // 로딩 시작
  btn.classList.add('loading');
  btn.disabled = true;
  errBox.style.display = 'none';
  stopPreview();

  try {
    const res = await fetch(`${API_BASE}/recommend`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        weather: selectedWeather,
        diary: diaryInput.value.trim(),
        track_count: parseInt(slider.value),
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: '알 수 없는 오류' }));
      throw new Error(err.detail || `서버 오류 (${res.status})`);
    }

    const data = await res.json();
    renderPlaylist(data);

    // 부드럽게 스크롤
    setTimeout(() => {
      document.getElementById('playlist-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);

  } catch (e) {
    errBox.textContent = `⚠️ ${e.message}`;
    errBox.style.display = 'block';
  } finally {
    btn.classList.remove('loading');
    updateBtn();
  }
});

/* ── 플레이리스트 렌더링 ─────────────────────────────────────────────── */
function renderPlaylist({ weather, tags, tracks }) {
  const section    = document.getElementById('playlist-section');
  const label      = document.getElementById('playlist-label');
  const tagsRow    = document.getElementById('tags-row');
  const trackList  = document.getElementById('track-list');

  label.textContent = `${weather} 날의 플레이리스트 — ${tracks.length}곡`;

  // 태그 배지
  tagsRow.innerHTML = tags.map(t =>
    `<span class="tag-badge">#${t}</span>`
  ).join('');

  // 트랙 카드
  trackList.innerHTML = '';
  tracks.forEach((track, i) => {
    trackList.appendChild(buildTrackCard(track, i + 1));
  });

  section.style.display = 'block';

  // 애니메이션
  trackList.querySelectorAll('.track-card').forEach((el, i) => {
    el.style.animationDelay = `${i * 45}ms`;
    el.classList.add('fade-up');
  });
}

function buildTrackCard(track, num) {
  const card = document.createElement('div');
  card.className = 'track-card';

  // 커버 이미지
  const coverEl = track.cover_url
    ? `<img class="track-cover" src="${escHtml(track.cover_url)}" alt="cover"
           onerror="this.outerHTML='<div class=track-cover-placeholder>🎵</div>'" />`
    : `<div class="track-cover-placeholder">🎵</div>`;

  // Spotify 버튼
  const spotifyBtn = track.spotify_url
    ? `<a class="btn-spotify" href="${escHtml(track.spotify_url)}" target="_blank" rel="noopener">
         <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
           <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm3.5 14.5l-1.5-2.6c1-.6 1.7-1.6 1.7-2.9 0-1.8-1.5-3-3.2-3-1.8 0-3.2 1.3-3.2 3 0 1.3.7 2.4 1.8 2.9l-1.5 2.6C7.9 15.3 7 13.8 7 12c0-2.8 2.2-5 5-5s5 2.2 5 5c0 1.8-.9 3.3-2.5 4.5h-1z"/>
         </svg>
         Apple Music
       </a>`
    : `<span class="btn-spotify disabled">링크 없음</span>`;

  // 미리듣기 버튼
  const previewBtn = track.preview_url
    ? `<button class="btn-preview" data-url="${escHtml(track.preview_url)}" title="미리듣기">▶</button>`
    : `<button class="btn-preview no-preview" disabled>▶</button>`;

  card.innerHTML = `
    <span class="track-num">${num}</span>
    ${coverEl}
    <div class="track-info">
      <div class="track-title">${escHtml(track.title)}</div>
      <div class="track-artist">${escHtml(track.artist)}</div>
    </div>
    <div class="track-actions">
      ${previewBtn}
      ${spotifyBtn}
    </div>
  `;

  // 미리듣기 토글
  const pvBtn = card.querySelector('.btn-preview:not(.no-preview)');
  if (pvBtn) {
    pvBtn.addEventListener('click', () => togglePreview(pvBtn, track.preview_url));
  }

  return card;
}

/* ── 미리듣기 ───────────────────────────────────────────────────────── */
function togglePreview(btn, url) {
  if (currentPlayingBtn === btn && !audio.paused) {
    stopPreview();
    return;
  }
  stopPreview();
  audio.src = url;
  audio.play().then(() => {
    btn.textContent = '⏸';
    btn.classList.add('playing');
    currentPlayingBtn = btn;
  }).catch(() => {});
}

function stopPreview() {
  if (currentPlayingBtn) {
    currentPlayingBtn.textContent = '▶';
    currentPlayingBtn.classList.remove('playing');
    currentPlayingBtn = null;
  }
  audio.pause();
  audio.src = '';
}

audio.addEventListener('ended', stopPreview);

/* ── 유틸 ───────────────────────────────────────────────────────────── */
function escHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ── 초기화 ─────────────────────────────────────────────────────────── */
loadWeatherOptions();
